# Cloudflare Pages Configuration
# Save as wrangler.toml or use Cloudflare Dashboard

name = "eoh-hyd-website"
type = "javascript"
account_id = ""  # Add your Cloudflare account ID
project_name = "eoh-hyd-website"

# Build configuration
build = { command = "npm run build", cwd = "./", root_dir = "dist" }

# Environment variables can be set in Cloudflare Dashboard
# or in the [env.production] section below

[env.production]
vars = { ENVIRONMENT = "production" }

[env.staging]
vars = { ENVIRONMENT = "staging" }

# Routes configuration (if needed)
# routes = [
#   { pattern = "example.com", zone_name = "example.com" }
# ]
